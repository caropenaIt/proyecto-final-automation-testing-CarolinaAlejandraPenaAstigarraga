[pytest]
# ==============================================================================
# CONFIGURACIÓN DE PYTEST
# ==============================================================================

# Opciones por defecto para pytest
addopts = 
    --html=reports/report.html
    --self-contained-html
    --tb=short
    --strict-markers
    -v
    --capture=no

# Marca para ejecutar solo tests de cierta categoría
markers =
    selenium: Tests que usan Selenium WebDriver (SauceDemo)
    api: Tests de API REST
    critical: Tests críticos que deben ejecutarse siempre
    slow: Tests que tardan más tiempo en ejecutarse
    smoke: Tests rápidos de validación básica

# Configuración de Python
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configuración de logging
log_cli = false
log_cli_level = INFO
log_file = logs/pytest.log
log_file_level = DEBUG

# Timeout para tests
timeout = 30

# Ignorar archivos específicos
norecursedirs = .git .venv venv __pycache__ *.egg-info build dist node_modules
testpaths = tests

# ==============================================================================
# INFORMACIÓN DEL REPORTE HTML
# ==============================================================================
# El reporte HTML se generará automáticamente en reports/report.html
# Características:
# - --html: genera reporte HTML
# - --self-contained-html: el reporte es un archivo único (sin dependencias externas)
# - --tb=short: traceback corto en caso de fallos
# - -v: modo verbose (muestra más información)
# - --capture=no: muestra los logs en tiempo real (importante para debugging)
